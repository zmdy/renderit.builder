<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renderit Editor</title>
  <link rel="shortcut icon" href="./assets/images/favicon_builder.ico" type="image/x-icon">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Custom Base Styles -->
  <script type="module">
    import { EDITOR_REPO } from './wizard/config.js';

    // Inicialização dinâmica de ativos do editor (Temas e Estilos)
    async function initEditorTheme() {
      // 1. Injeta CSS dinamicamente para facilitar manutenção via config.js
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.crossOrigin = 'anonymous';
      link.href = EDITOR_REPO.styleUrl;
      document.head.appendChild(link);

      // 2. Importa dinamicamente o motor de temas
      const { default: ThemeEngine } = await import(EDITOR_REPO.themeEngineUrl);

      // 3. Inicializa o engine
      await ThemeEngine.init();

      // 4. Vincula UI do Builder ao motor do Editor
      const btnToggleTheme = document.getElementById('btn-mode-toggle');
      if (btnToggleTheme) {
        btnToggleTheme.checked = ThemeEngine.currentMode === 'dark';
        btnToggleTheme.addEventListener('change', () => {
          ThemeEngine.toggleMode();
          btnToggleTheme.checked = ThemeEngine.currentMode === 'dark';
        });
      }

      const themeSelector = document.getElementById('theme-selector');
      if (themeSelector) {
        themeSelector.value = ThemeEngine.currentThemeKey;
        themeSelector.addEventListener('change', (e) => {
          ThemeEngine.loadTheme(e.target.value);
        });
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initEditorTheme);
    } else {
      initEditorTheme();
    }
  </script>
  <!-- JSZip -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <!-- CodeMirror 5 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-ocean.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/neo.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>

  <!-- DOMPurify -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: 'var(--re-bg)',
            surface: 'var(--re-surface)',
            panel: 'var(--re-panel)',
            'panel-alt': 'var(--re-panel-alt)',
            border: 'var(--re-border)',
            'border-bright': 'var(--re-border-bright)',
            text: 'var(--re-text)',
            'text-2': 'var(--re-text-2)',
            'text-3': 'var(--re-text-3)',
            accent: 'var(--re-accent)',
            'accent-dim': 'var(--re-accent-dim)',
            'accent-glow': 'var(--re-accent-glow)',
            success: 'var(--re-success)',
            danger: 'var(--re-danger)',
            warn: 'var(--re-warn)',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  
  <!-- Builder Styles -->
  <link rel="stylesheet" href="assets/css/builder.css">

  <!-- Módulo Principal do Wizard -->
  <script type="module" src="wizard/wizard.js"></script>
</head>

<body class="bg-bg text-text h-screen w-screen overflow-hidden flex flex-col font-sans text-[13px] antialiased">

  <!-- TOOLBAR -->
  <header id="app-header" class="h-12 shrink-0 bg-surface border-b border-border flex items-center shadow-sm relative z-40">

    <!-- Logo -->
    <div class="w-[264px] shrink-0 border-r border-border h-full flex items-center px-4 gap-2.5">
      <h1 class="font-semibold text-[13px] tracking-wide text-text flex items-center gap-2">
        <img src="./assets/images/logo-renderit-builder.svg" alt="Renderit Builder" class="h-6">
        <span class="opacity-50 font-normal text-[10px] mt-1">v0.1.0</span>
      </h1>
    </div>

    <!-- Center / Step Indicator -->
    <div class="flex-1 px-6 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <!-- Theme Selector -->
        <div class="flex items-center gap-2">
          <i class="fa-solid fa-palette text-text-3 text-sm"></i>
          <select id="theme-selector" class="top-select min-w-[130px]">
            <option value="electric-blue">Electric Blue</option>
            <option value="dracula">Dracula Theme</option>
            <option value="sunset-glow">Sunset Glow</option>
            <option value="evergreen">Evergreen</option>
          </select>
        </div>
      </div>

      <!-- STEP INDICATOR -->
      <div class="flex items-center gap-3 bg-panel-alt px-4 py-1.5 rounded-full border border-border shadow-inner">
        <span class="text-[10px] font-bold text-text-3 uppercase tracking-widest">Wizard Progress</span>
        <div class="flex gap-1" id="step-indicator-dots">
          <div class="w-2 h-2 rounded-full bg-accent shadow-[0_0_8px_var(--re-accent)]"></div>
          <div class="w-2 h-2 rounded-full bg-border"></div>
          <div class="w-2 h-2 rounded-full bg-border"></div>
          <div class="w-2 h-2 rounded-full bg-border"></div>
          <div class="w-2 h-2 rounded-full bg-border"></div>
        </div>
        <span class="text-[11px] font-mono text-accent font-bold ml-2" id="step-label">1 / 5</span>
      </div>
      
      <div></div> <!-- Spacer -->
    </div>

    <!-- Actions & Light/Dark Toggle -->
    <div class="w-[320px] shrink-0 border-l border-border h-full flex items-center justify-end px-4 gap-4">
      
      <!-- Reset Button -->
      <button id="btn-reset" class="text-text-3 hover:text-danger flex items-center gap-1.5 transition-colors text-[11px] font-medium mr-2" title="Recomeçar do zero">
        <i class="fa-solid fa-rotate-left text-[10px]"></i> Reset
      </button>

      <!-- Toggle Switch for Dark/Light Mode -->
      <div class="flex items-center justify-center gap-2">
        <i class="fa-solid fa-sun text-warn text-sm"></i>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" id="btn-mode-toggle" class="sr-only peer">
          <div
            class="w-11 h-6 bg-border-bright rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-warn">
          </div>
        </label>
        <i class="fa-solid fa-moon text-text-3 text-sm" id="icon-moon"></i>
      </div>

      <!-- Export Menu -->
      <div class="relative group">
        <button id="btn-export-main"
          class="h-7 px-4 rounded-md bg-accent text-white font-medium text-xs shadow-[0_0_12px_var(--re-accent-dim)] hover:bg-blue-600 transition-colors flex items-center gap-2">
          <i class="fa-solid fa-download"></i> Export <i class="fa-solid fa-chevron-down text-[8px] opacity-70"></i>
        </button>
        <!-- Dropdown -->
        <div
          class="absolute right-0 top-full mt-1 w-48 bg-panel border border-border rounded-lg shadow-xl py-1 z-50 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all">
          <button id="export-current"
            class="w-full text-left px-4 py-2 text-xs text-text hover:bg-accent/10 hover:text-accent flex items-center gap-2">
            <i class="fa-solid fa-file-code"></i> Baixar Arquivo Atual
          </button>
          <button id="export-all"
            class="w-full text-left px-4 py-2 text-xs text-text hover:bg-accent/10 hover:text-accent flex items-center gap-2">
            <i class="fa-solid fa-files"></i> Baixar Tudo (Individual)
          </button>
          <button id="export-zip"
            class="w-full text-left px-4 py-2 text-xs text-text hover:bg-accent/10 hover:text-accent flex items-center gap-2">
            <i class="fa-solid fa-file-zipper"></i> Baixar como .ZIP
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN LAYOUT -->
  <main id="wizard-container" class="flex-1 flex flex-col items-center justify-center overflow-hidden">
    <!-- EMPTY STATE / DRAG AND DROP -->
    <div id="dropzone" class="flex-1 flex flex-col items-center justify-center dropzone-overlay active">
      <div class="dropzone-box flex flex-col items-center justify-center">
        <div class="w-16 h-16 rounded-full bg-accent-dim text-accent flex items-center justify-center text-3xl mb-4">
          <i class="fa-regular fa-folder-open"></i>
        </div>
        <h2 class="text-xl font-semibold text-text mb-2">Abra um Arquivo ou Pasta</h2>
        <p class="text-text-2 mb-6">Arraste seus aquivos .html aqui ou clique no botão abaixo.</p>

        <div class="flex gap-4">
          <button id="btn-open-file"
            class="px-5 py-2.5 rounded-lg bg-panel border-2 border-border text-text font-medium hover:border-accent hover:text-accent transition-colors">
            <i class="fa-solid fa-file-code mr-2"></i> Selecionar Arquivo
          </button>
          <button id="btn-open-folder"
            class="px-5 py-2.5 rounded-lg bg-accent text-white font-medium hover:bg-blue-600 shadow-lg shadow-accent/20 transition-all">
            <i class="fa-solid fa-folder-tree mr-2"></i> Abrir Pasta
          </button>
        </div>

        <!-- Hidden intputs for file picking fallback -->
        <input type="file" id="file-input" accept=".html, text/html" class="hidden">
        <!-- Webkitdirectory for folder picking -->
        <input type="file" id="folder-input" webkitdirectory directory multiple class="hidden">
      </div>
    </div>
  </main>

  <footer id="app-footer"
    class="h-9 shrink-0 bg-surface border-t border-border flex items-center px-4 justify-between z-50 shadow-[0_-4px_12px_rgba(0,0,0,0.1)]">
    
    <!-- App Info -->
    <div class="flex items-center gap-4 text-[10px] font-medium text-text-3">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-terminal opacity-70"></i>
        <span class="text-text-2 uppercase tracking-wider">Renderit.builder</span>
      </div>
      <span class="opacity-20">|</span>
      <span>v0.1.0</span>
    </div>

    <!-- Navigation Buttons -->
    <div class="flex items-center gap-2">
      <button id="btn-prev" class="h-6 px-4 rounded bg-panel border border-border text-text-3 text-[10px] font-bold uppercase tracking-widest hover:bg-border hover:text-text transition-all disabled:opacity-30 disabled:cursor-not-allowed">
        <i class="fa-solid fa-chevron-left mr-1.5"></i> Voltar
      </button>
      <button id="btn-next" class="h-6 px-4 rounded bg-accent text-white text-[10px] font-bold uppercase tracking-widest hover:bg-blue-600 shadow-[0_0_8px_var(--re-accent-dim)] transition-all disabled:opacity-30 disabled:cursor-not-allowed">
        Próximo <i class="fa-solid fa-chevron-right ml-1.5"></i>
      </button>
    </div>

    <!-- Status Indicator -->
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-1.5">
        <div class="w-1.5 h-1.5 rounded-full bg-success shadow-[0_0_6px_var(--re-success)] animate-pulse"></div>
        <span id="status-text" class="text-[10px] font-medium text-text-3">Ready</span>
      </div>
    </div>
  </footer>

</body>

</html>
